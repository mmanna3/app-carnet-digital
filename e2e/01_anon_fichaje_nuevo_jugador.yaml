appId: com.blueservant.edefi
---
# Flujo completo "nuevo jugador": home → intro → código → datos → foto → fotos DNI → autorización → confirmación
#
# Nota E2E: usa addMedia para foto-e2e.jpg en galería; el test interactúa con date picker y
# selectores de imagen como lo haría un usuario real.
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'card-fichaje'
- tapOn:
    id: 'card-fichaje'
# Esperar la navegación
- extendedWaitUntil:
    visible:
      id: 'card-nuevo'
- tapOn:
    id: 'card-nuevo'
# PasoCodigoEquipo (paso 1 de 5)
- assertVisible:
    id: 'paso-codigo-equipo'
- tapOn:
    id: 'input-codigo-equipo'
- inputText: 'MTD0001'
- tapOn:
    id: 'titulo-codigo-equipo'
- extendedWaitUntil:
    visible:
      id: 'boton-validar'
      enabled: true
- tapOn:
    id: 'boton-validar'
# PasoDatosJugador (paso 2 de 5) — fecha de nacimiento vía date picker
- assertVisible:
    id: 'paso-datos-jugador'
- tapOn:
    id: 'input-nombre'
- inputText: 'Juan'
- tapOn:
    id: 'input-apellido'
- inputText: 'Perez'
- tapOn:
    id: 'input-dni-jugador'
- inputText: '12345678'
# Cerrar teclado antes de abrir el picker (necesario en iOS)
- tapOn:
    text: 'Datos del jugador'
- tapOn:
    id: 'input-fecha-nacimiento'
- waitForAnimationToEnd
# iOS: el Modal del date picker no expone sus elementos al árbol de accesibilidad de Maestro;
# se gira la rueda del año con swipe (dispara onChange) y se cierra con tap en "Listo" (~93% vertical)
- runFlow:
    when:
      platform: ios
    commands:
      - swipe:
          start: '75%, 70%'
          end: '75%, 50%'
          duration: 500
      - tapOn:
          point: '50%, 93%'
- runFlow:
    when:
      platform: android
    commands:
      - tapOn:
          text: 'OK'
          optional: true
      - tapOn:
          text: 'Aceptar'
          optional: true
- extendedWaitUntil:
    visible:
      id: 'boton-continuar'
      enabled: true
- tapOn:
    id: 'boton-continuar'
# PasoFoto (paso 3 de 5) — seleccionar foto desde galería
- assertVisible:
    id: 'paso-foto'
- tapOn:
    id: 'boton-seleccionar-foto'
- tapOn: 'Elegir de galería'
- runFlow:
    when:
      platform: ios
    commands:
      - tapOn:
          text: 'Photo, .*'
          index: 0
          optional: true
      - tapOn:
          id: 'PXGGridLayout-Info'
          index: 0
          optional: true
- runFlow:
    when:
      platform: android
    commands:
      - tapOn:
          id: 'com.google.android.providers.media.module:id/icon_thumbnail'
          optional: true
      - tapOn:
          id: 'com.google.android.documentsui:id/thumbnail'
          optional: true
- extendedWaitUntil:
    visible:
      id: 'boton-subir-foto'
      enabled: true
- tapOn:
    id: 'boton-subir-foto'
# PasoFotosDni (paso 4 de 5) — frente y dorso desde galería
- assertVisible:
    id: 'paso-fotos-dni'
- tapOn:
    id: 'boton-seleccionar-frente'
- tapOn: 'Elegir de galería'
- runFlow:
    when:
      platform: ios
    commands:
      - tapOn:
          text: 'Photo, .*'
          index: 0
          optional: true
      - tapOn:
          id: 'PXGGridLayout-Info'
          index: 0
          optional: true
- runFlow:
    when:
      platform: android
    commands:
      - tapOn:
          id: 'com.google.android.providers.media.module:id/icon_thumbnail'
          optional: true
      - tapOn:
          id: 'com.google.android.documentsui:id/thumbnail'
          optional: true
- waitForAnimationToEnd
- scroll
- tapOn:
    id: 'boton-seleccionar-dorso'
- tapOn: 'Elegir de galería'
- runFlow:
    when:
      platform: ios
    commands:
      - tapOn:
          text: 'Photo, .*'
          index: 0
          optional: true
      - tapOn:
          id: 'PXGGridLayout-Info'
          index: 0
          optional: true
- runFlow:
    when:
      platform: android
    commands:
      - tapOn:
          id: 'com.google.android.providers.media.module:id/icon_thumbnail'
          optional: true
      - tapOn:
          id: 'com.google.android.documentsui:id/thumbnail'
          optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'boton-subir-dni'
      enabled: true
- tapOn:
    id: 'boton-subir-dni'
# PasoAutorizacion (paso 5 de 5) → POST /api/Jugador al mock server
- assertVisible:
    id: 'paso-autorizacion'
- tapOn:
    id: 'boton-enviar'
# PantallaConfirmacion
- assertVisible:
    id: 'pantalla-confirmacion'
