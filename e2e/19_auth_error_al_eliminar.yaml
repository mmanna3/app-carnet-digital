appId: com.blueservant.edefi
---
# Error al eliminar jugador: el servidor devuelve 500 → aparece alerta de error
#
# Verifica que cuando la API falla durante una desvinculación, el error se comunica
# al usuario (Alert nativo) y la app no crashea ni queda en estado indefinido.
#
# Usa evalScript para cambiar el escenario del mock server a 'error_desvincular'
# antes del test y restaurarlo al finalizar.
- evalScript: |
    http.post('http://localhost:3001/_set-scenario', '{"scenario":"error_desvincular"}')
- launchApp:
    clearState: true
- waitForAnimationToEnd
- tapOn:
    id: 'card-delegados'
# PantallaLogin
- assertVisible:
    id: 'pantalla-login'
- tapOn:
    id: 'input-usuario'
- inputText: 'delegado-e2e'
- tapOn:
    id: 'input-password'
- inputText: 'password123'
- runFlow:
    when:
      platform: android
    commands:
      - hideKeyboard
- extendedWaitUntil:
    visible:
      id: 'boton-iniciar-sesion'
      enabled: true
- tapOn:
    id: 'boton-iniciar-sesion'
# PantallaSeleccionEquipo
- assertVisible:
    id: 'pantalla-seleccion-equipo'
- tapOn:
    id: 'item-equipo-1'
# Tab Mis Jugadores — long press → eliminar → confirmar (falla en el servidor)
- assertVisible:
    id: 'pantalla-mis-jugadores'
- extendedWaitUntil:
    visible:
      id: 'carnet-jugador'
- longPressOn:
    id: 'carnet-jugador'
- waitForAnimationToEnd
# ModalAccionesJugador — tap por testID (Android) o coordenada relativa (iOS bottom sheet)
- runFlow:
    when:
      platform: android
    commands:
      - tapOn:
          id: 'boton-eliminar-jugador'
- runFlow:
    when:
      platform: ios
    commands:
      - tapOn:
          point: '50%, 75%'
- waitForAnimationToEnd
# ModalEliminarJugador — confirmar (modal centrado, testID accesible en iOS)
- tapOn:
    id: 'boton-quitar-del-equipo'
# El servidor devuelve 500 → aparece Alert nativo con el título del error
- assertVisible:
    text: 'Error al desvincular'
# Descartar el alert y verificar que la app sigue en pie
- tapOn:
    text: 'OK'
- assertVisible:
    id: 'pantalla-mis-jugadores'
# Restaurar escenario happy para no afectar tests siguientes
- evalScript: |
    http.post('http://localhost:3001/_set-scenario', '{"scenario":"happy"}')
