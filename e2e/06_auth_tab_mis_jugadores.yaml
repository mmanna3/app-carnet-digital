appId: com.ykn.edefidelegados
---
# Flujo: login → seleccionar equipo → tab Mis Jugadores muestra carnets
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'card-delegados'
    timeout: 15000
- tapOn:
    id: 'card-delegados'
# Esperar la navegación
- extendedWaitUntil:
    visible:
      id: 'pantalla-login'
    timeout: 15000
- tapOn:
    id: 'input-usuario'
- inputText: 'delegado-e2e'
- tapOn:
    id: 'input-password'
- inputText: 'password123'
- runFlow:
    when:
      platform: android
    commands:
      - hideKeyboard
- extendedWaitUntil:
    visible:
      id: 'boton-iniciar-sesion'
      enabled: true
    timeout: 15000
- tapOn:
    id: 'boton-iniciar-sesion'
# PantallaSeleccionEquipo — tap en el primer equipo del mock
- assertVisible:
    id: 'pantalla-seleccion-equipo'
- tapOn:
    id: 'item-equipo-1'
# Tab Mis Jugadores
- assertVisible:
    id: 'pantalla-mis-jugadores'
- assertVisible:
    id: 'carnet-jugador-1'
