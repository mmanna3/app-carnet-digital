appId: com.ykn.edefidelegados
---
# Validación: DNI con formato inválido → botón continuar deshabilitado
#
# El campo DNI requiere entre 7 y 9 dígitos. Con menos dígitos, el botón
# 'Continuar' permanece deshabilitado aunque el resto de los campos estén completos.
# Verifica además que al completar con un DNI válido el botón se habilita.
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'card-fichaje'
    timeout: 15000
- tapOn:
    id: 'card-fichaje'
# Esperar la navegación (puede haber spinner de fichaje-esta-habilitado)
- extendedWaitUntil:
    visible:
      id: 'card-nuevo'
    timeout: 15000
- tapOn:
    id: 'card-nuevo'
# PasoCodigoEquipo — pasar con código válido
- assertVisible:
    id: 'paso-codigo-equipo'
- tapOn:
    id: 'input-codigo-equipo'
- inputText: 'MTD0001'
- tapOn:
    id: 'titulo-codigo-equipo'
- extendedWaitUntil:
    visible:
      id: 'boton-validar'
      enabled: true
    timeout: 15000
- tapOn:
    id: 'boton-validar'
# PasoDatosJugador — completar todos los campos excepto DNI (inválido)
- assertVisible:
    id: 'paso-datos-jugador'
- tapOn:
    id: 'input-nombre'
- inputText: 'Juan'
- tapOn:
    id: 'input-apellido'
- inputText: 'Perez'
# Android: hideKeyboard en CI a veces deja el foco/layout de forma que el TextInput del DNI
# no queda en el árbol accesible para Maestro. Igual que en 01_anon: tocar el título cierra
# el teclado y estabiliza el ScrollView.
- runFlow:
    when:
      platform: android
    commands:
      - tapOn:
          text: 'Datos del jugador'
# El formulario puede requerir scroll para que el DNI quede visible (ScrollView dentro de KAV).
- swipe:
    start: '50%, 72%'
    end: '50%, 38%'
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'input-dni-jugador'
    timeout: 15000
# Ingresar solo 5 dígitos (mínimo requerido: 7)
- tapOn:
    id: 'input-dni-jugador'
- inputText: '12345'
# Cerrar teclado y abrir el date picker
# Nota: el Modal del date picker no expone sus elementos al árbol de accesibilidad de Maestro
# en iOS, por lo que se usa tap por coordenada relativa para cerrar con "Listo"
- tapOn:
    text: 'Datos del jugador'
- tapOn:
    id: 'input-fecha-nacimiento'
- waitForAnimationToEnd
- runFlow:
    when:
      platform: ios
    commands:
      # Girar la rueda del año para disparar onChange (setFechaNac)
      - swipe:
          start: '75%, 70%'
          end: '75%, 50%'
          duration: 500
      - tapOn:
          point: '50%, 93%'
- runFlow:
    when:
      platform: android
    commands:
      - tapOn:
          text: 'OK'
          optional: true
      - tapOn:
          text: 'Aceptar'
          optional: true
# Con DNI de 5 dígitos, el botón debe estar deshabilitado.
# Android: assertVisible enabled:false no funciona con New Architecture/Fabric.
# En su lugar, tapear el botón y verificar que no avanzó el paso.
# El botón puede estar debajo del fold tras fecha + teclado.
- scrollUntilVisible:
    element:
      id: 'boton-continuar'
    direction: DOWN
    timeout: 25000
- tapOn:
    id: 'boton-continuar'
- assertVisible:
    id: 'paso-datos-jugador'
# Completar el DNI con 2 dígitos más para llegar a 7 (válido)
# Android: inputText reemplaza el contenido existente → ingresar el DNI completo sin eraseText
# iOS: inputText agrega al final → ingresar solo los 2 dígitos restantes
- runFlow:
    when:
      platform: android
    commands:
      - tapOn:
          text: 'Datos del jugador'
      - swipe:
          start: '50%, 72%'
          end: '50%, 38%'
          duration: 400
      - extendedWaitUntil:
          visible:
            id: 'input-dni-jugador'
          timeout: 15000
      - tapOn:
          id: 'input-dni-jugador'
      - inputText: '1234567'
- runFlow:
    when:
      platform: ios
    commands:
      - tapOn:
          id: 'input-dni-jugador'
      - inputText: '67'
# DNI válido + fecha ya cargada: Continuar debe poder completar validación y pasar a foto.
# Android Fabric: no usar enabled:true en el árbol de accesibilidad (falla en CI). Verificación
# conductual: scroll hasta el botón → tap → siguiente paso (mock el-dni-esta-fichado = false).
- scrollUntilVisible:
    element:
      id: 'boton-continuar'
    direction: DOWN
    timeout: 25000
- tapOn:
    id: 'boton-continuar'
- extendedWaitUntil:
    visible:
      id: 'paso-foto'
    timeout: 20000
