appId: com.blueservant.edefi
---
# Error de red al cargar mis jugadores: el servidor devuelve 500 → pantalla de error
#
# Verifica que cuando GET /api/carnet-digital/carnets falla, la pantalla muestra
# el estado de error en lugar de crashear o quedarse en loading indefinido.
#
# El mock server usa lógica determinista: equipoId=3 (Equipo B2) → devuelve 500.
# No necesita cambio de escenario — seleccionar Equipo B2 dispara el error.
- launchApp:
    clearState: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: 'card-delegados'
- tapOn:
    id: 'card-delegados'
# Esperar la navegación
- extendedWaitUntil:
    visible:
      id: 'pantalla-login'
- tapOn:
    id: 'input-usuario'
- inputText: 'delegado-e2e'
- tapOn:
    id: 'input-password'
- inputText: 'password123'
- runFlow:
    when:
      platform: android
    commands:
      - hideKeyboard
- extendedWaitUntil:
    visible:
      id: 'boton-iniciar-sesion'
      enabled: true
- tapOn:
    id: 'boton-iniciar-sesion'
# PantallaSeleccionEquipo — elegir Equipo B2 (id=3) que dispara el error
- assertVisible:
    id: 'pantalla-seleccion-equipo'
- tapOn:
    id: 'item-equipo-3'
# Tab Mis Jugadores — debe mostrar estado de error, no crash
- assertVisible:
    text: 'Error al cargar los jugadores.'
- assertNotVisible:
    id: 'carnet-jugador-1'
